<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF文件翻译工具</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #102033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 30% 20%, rgba(37, 99, 235, 0.14), transparent 30%),
          linear-gradient(135deg, #f8fbff 0%, #eef4ff 48%, #f7f9fc 100%);
      }

      main {
        width: min(560px, calc(100vw - 48px));
        text-align: center;
      }

      .logo-wrap {
        width: 118px;
        height: 118px;
        margin: 0 auto 26px;
        display: grid;
        place-items: center;
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(50, 99, 160, 0.14);
        box-shadow: 0 22px 60px rgba(27, 61, 110, 0.14);
      }

      .logo-wrap img {
        width: 90px;
        height: 90px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 12px 0 0;
        color: #53647a;
        font-size: 16px;
      }

      .spinner {
        width: 44px;
        height: 44px;
        margin: 34px auto 20px;
        border: 4px solid rgba(37, 99, 235, 0.18);
        border-top-color: #2563eb;
        border-radius: 999px;
        animation: spin 0.9s linear infinite;
      }

      .status {
        min-height: 48px;
        display: grid;
        place-items: center;
        color: #1e3a5f;
        font-size: 16px;
        font-weight: 600;
      }

      .hint {
        margin-top: 16px;
        color: #718096;
        font-size: 13px;
        line-height: 1.5;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo-wrap"><img src="assets/app-icon.png" alt="PDF文件翻译工具" /></div>
      <h1>PDF文件翻译工具</h1>
      <p>PDF 翻译、OCR 识别与版式保留</p>
      <div class="spinner" aria-hidden="true"></div>
      <div class="status" id="status">正在启动本地服务...</div>
      <div class="hint">首次启动会准备本地运行环境，完成后会自动进入应用。</div>
    </main>
    <script>
      window.setStatus = function (message) {
        const status = document.getElementById("status");
        if (status) status.textContent = message;
      };
    </script>
  </body>
</html>
